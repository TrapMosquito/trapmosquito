<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrapMosquito — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --cream:#f5f0e8; --moss:#3d4a35; --sage:#7a8c6e; --sand:#c8b89a; --charcoal:#1e2019; --mist:#e8ede3; --accent:#5c7a52; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--charcoal); font-family:'DM Sans',sans-serif; font-weight:300; min-height:100vh; display:grid; grid-template-columns:1fr 1fr; }
  .left-panel { background:var(--moss); padding:60px; display:flex; flex-direction:column; justify-content:space-between; }
  .logo { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--cream); text-decoration:none; letter-spacing:0.06em; }
  .logo span { font-style:italic; color:var(--sand); }
  .left-content h2 { font-family:'Cormorant Garamond',serif; font-size:52px; font-weight:300; color:var(--cream); line-height:1.05; margin-bottom:24px; }
  .left-content h2 em { font-style:italic; color:var(--sand); }
  .left-content p { font-size:15px; line-height:1.75; color:rgba(245,240,232,0.6); max-width:340px; }
  .left-features { display:flex; flex-direction:column; gap:16px; }
  .left-feature { display:flex; gap:14px; align-items:center; font-size:13px; color:rgba(245,240,232,0.65); }
  .left-feature::before { content:'○'; color:var(--sand); font-size:10px; flex-shrink:0; }
  .right-panel { display:flex; align-items:center; justify-content:center; padding:60px 80px; }
  .auth-box { width:100%; max-width:400px; }
  .auth-tabs { display:flex; margin-bottom:40px; border-bottom:1px solid rgba(245,240,232,0.1); }
  .auth-tab { flex:1; padding:14px 0; background:none; border:none; border-bottom:2px solid transparent; color:rgba(245,240,232,0.4); font-family:'DM Sans',sans-serif; font-size:13px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; margin-bottom:-1px; transition:all 0.2s; }
  .auth-tab.active { color:var(--cream); border-bottom-color:var(--accent); }
  .form-wrap { display:none; }
  .form-wrap.active { display:block; }
  .auth-form { display:flex; flex-direction:column; gap:16px; }
  .form-group { display:flex; flex-direction:column; gap:8px; }
  .form-group label { font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(245,240,232,0.45); }
  .form-group input { background:rgba(245,240,232,0.06); border:1px solid rgba(245,240,232,0.12); padding:14px 18px; color:var(--cream); font-family:'DM Sans',sans-serif; font-size:14px; border-radius:3px; outline:none; transition:border-color 0.2s; }
  .form-group input:focus { border-color:var(--sage); }
  .form-group input::placeholder { color:rgba(245,240,232,0.2); }
  .btn-auth { background:var(--accent); color:var(--cream); border:none; padding:16px; font-family:'DM Sans',sans-serif; font-size:13px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; border-radius:3px; margin-top:8px; transition:background 0.2s; }
  .btn-auth:hover { background:var(--moss); }
  .btn-auth:disabled { opacity:0.5; cursor:not-allowed; }
  .alert { padding:12px 16px; border-radius:3px; font-size:13px; line-height:1.5; display:none; margin-bottom:8px; }
  .alert.error { background:rgba(180,60,60,0.15); border:1px solid rgba(180,60,60,0.3); color:#e8a0a0; }
  .alert.success { background:rgba(92,122,82,0.2); border:1px solid rgba(92,122,82,0.4); color:#a8c89a; }
  .forgot-link { text-align:right; font-size:12px; color:rgba(245,240,232,0.35); cursor:pointer; transition:color 0.2s; }
  .forgot-link:hover { color:var(--sage); }
  @media(max-width:768px){ body{grid-template-columns:1fr;} .left-panel{display:none;} .right-panel{padding:40px 24px;} }
</style>
</head>
<body>
<div class="left-panel">
  <a href="index.html" class="logo">Trap<span>Mosquito</span></a>
  <div class="left-content">
    <h2>Welcome<br><em>back.</em></h2>
    <p>Manage your service, view upcoming visits, and update your billing all in one place.</p>
  </div>
  <div class="left-features">
    <div class="left-feature">View your next scheduled service date</div>
    <div class="left-feature">Update payment method anytime</div>
    <div class="left-feature">Manage or upgrade your plan</div>
  </div>
</div>
<div class="right-panel">
  <div class="auth-box">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Sign In</button>
      <button class="auth-tab" id="tab-signup">Create Account</button>
    </div>
    <div id="alert" class="alert"></div>
    <div class="form-wrap active" id="form-login">
      <div class="auth-form">
        <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com" /></div>
        <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" /></div>
        <div class="forgot-link" id="forgot-link">Forgot password?</div>
        <button class="btn-auth" id="login-btn">Sign In</button>
      </div>
    </div>
    <div class="form-wrap" id="form-signup">
      <div class="auth-form">
        <div class="form-group"><label>Full Name</label><input type="text" id="signup-name" placeholder="Your full name" /></div>
        <div class="form-group"><label>Email</label><input type="email" id="signup-email" placeholder="you@example.com" /></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="signup-phone" placeholder="(305) 555-0100" /></div>
        <div class="form-group"><label>Password</label><input type="password" id="signup-password" placeholder="At least 8 characters" /></div>
        <button class="btn-auth" id="signup-btn">Create Account</button>
      </div>
    </div>
  </div>
</div>
<script>
  const SUPABASE_URL = 'https://gzynsejrcztdwvdvixkd.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6eW5zZWpyY3p0ZHd2ZHZpeGtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMjM5NTAsImV4cCI6MjA5MTY5OTk1MH0.CZFS0rGRSQhsXQwSXry1wW1NuqUfwcXeDzwU8sSwVI0';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Tab switching
  document.getElementById('tab-login').addEventListener('click', function() {
    document.getElementById('tab-login').classList.add('active');
    document.getElementById('tab-signup').classList.remove('active');
    document.getElementById('form-login').classList.add('active');
    document.getElementById('form-signup').classList.remove('active');
    document.getElementById('alert').style.display = 'none';
  });
  document.getElementById('tab-signup').addEventListener('click', function() {
    document.getElementById('tab-signup').classList.add('active');
    document.getElementById('tab-login').classList.remove('active');
    document.getElementById('form-signup').classList.add('active');
    document.getElementById('form-login').classList.remove('active');
    document.getElementById('alert').style.display = 'none';
  });

  function showAlert(msg, type) {
    var el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert ' + type;
    el.style.display = 'block';
  }

  // Login
  document.getElementById('login-btn').addEventListener('click', async function() {
    var email = document.getElementById('login-email').value.trim();
    var password = document.getElementById('login-password').value;
    if (!email || !password) { showAlert('Please fill in all fields.', 'error'); return; }
    this.disabled = true; this.textContent = 'Signing in...';
    var result = await sb.auth.signInWithPassword({ email: email, password: password });
    if (result.error) {
      showAlert(result.error.message, 'error');
      this.disabled = false; this.textContent = 'Sign In';
    } else {
      window.location.href = 'portal.html';
    }
  });

  // Sign up
  document.getElementById('signup-btn').addEventListener('click', async function() {
    var name = document.getElementById('signup-name').value.trim();
    var email = document.getElementById('signup-email').value.trim();
    var phone = document.getElementById('signup-phone').value.trim();
    var password = document.getElementById('signup-password').value;
    if (!name || !email || !password) { showAlert('Please fill in all required fields.', 'error'); return; }
    if (password.length < 8) { showAlert('Password must be at least 8 characters.', 'error'); return; }
    this.disabled = true; this.textContent = 'Creating account...';
    var result = await sb.auth.signUp({ email: email, password: password, options: { data: { full_name: name, phone: phone } } });
    if (result.error) {
      showAlert(result.error.message, 'error');
      this.disabled = false; this.textContent = 'Create Account';
    } else {
      await sb.from('customers').insert({ user_id: result.data.user.id, full_name: name, phone: phone, subscription_status: 'pending' });
      showAlert('Account created! Check your email to confirm, then sign in.', 'success');
      setTimeout(function() {
        document.getElementById('tab-login').click();
      }, 2500);
    }
  });

  // Forgot password
  document.getElementById('forgot-link').addEventListener('click', async function() {
    var email = prompt('Enter your email address:');
    if (!email) return;
    var result = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/reset-password.html' });
    if (result.error) showAlert(result.error.message, 'error');
    else showAlert('Password reset email sent. Check your inbox.', 'success');
  });

  // Redirect if already logged in
  sb.auth.getSession().then(function(result) {
    if (result.data.session) window.location.href = 'portal.html';
  });
</script>
</body>
</html>
